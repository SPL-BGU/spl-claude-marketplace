name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-marketplace:
    name: Validate Marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate catalog and plugins
        run: python3 tests/validate_marketplace.py

  shell-syntax:
    name: Shell Script Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check all shell scripts (bash -n)
        run: |
          fail=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "::error file=$f::shell syntax error"
              fail=1
            fi
          done < <(find . -name '*.sh' -not -path './.git/*')
          exit $fail

  ci:
    # Aggregator job: branch-protection requires a status check named exactly
    # "Marketplace CI". This job passes only when every upstream job passes,
    # so new jobs can be added above without touching the ruleset.
    name: Marketplace CI
    runs-on: ubuntu-latest
    needs:
      - validate-marketplace
      - shell-syntax
    if: always()
    steps:
      - name: Verify all upstream jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more upstream jobs failed or were cancelled."
            exit 1
          fi
          echo "All upstream jobs succeeded."
